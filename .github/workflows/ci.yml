name: ci

on:
    push:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pipx install poetry

            - name: Install dependencies
              run: poetry install

            - name: Lint
              run: poetry run ruff check .

            - name: Format check
              run: poetry run ruff format . --check

            - name: Test
              run: poetry run pytest
